<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanto Group — Strategic Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f1117;--ink-light:#4a4f5e;--rule:#e2e4ea;
  --bg:#f5f5f2;--card:#fff;--accent:#c8382b;--accent-dark:#9e2820;
  --positive:#2a7d4f;--negative:#c8382b;--warn:#e67e22;--teal:#1a6b7a;
  --gold:#c8972b;--radius:12px;
  --shadow:0 2px 12px rgba(15,17,23,.07);
  --shadow-lg:0 8px 40px rgba(15,17,23,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{background:var(--ink);color:#fff;padding:14px 20px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,.3);flex-wrap:wrap;gap:8px}
.logo{font-family:'DM Serif Display',serif;font-size:19px;flex-shrink:0}
.logo .ac{color:var(--accent)}
.logo .sub{color:rgba(255,255,255,.38);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:300;margin-left:8px}
.hdr-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;
  border:none;transition:all .18s;-webkit-appearance:none}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff}
.btn-ghost:hover{background:rgba(255,255,255,.2)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--rule)}
.btn-outline:hover{background:var(--bg)}
.btn-gold{background:var(--gold);color:#fff}
.btn-danger{background:transparent;color:var(--negative);border:1.5px solid #f5c6c4}
.btn-sm{padding:5px 11px;font-size:12px}
.user-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);
  border-radius:20px;padding:4px 12px 4px 4px;font-size:12px;font-weight:500;color:#fff}
.user-av{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0}
.user-av img{width:24px;height:24px;display:block}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;flex-shrink:0}
.sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{max-width:960px;margin:0 auto;padding:26px 16px 80px}
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:75vh;padding:20px}
.auth-card{background:var(--card);border-radius:16px;padding:36px 40px;max-width:400px;
  width:100%;box-shadow:var(--shadow-lg);text-align:center}
.auth-logo{font-family:'DM Serif Display',serif;font-size:30px;margin-bottom:20px}
.auth-logo span{color:var(--accent)}
.auth-card h2{font-size:20px;font-weight:600;margin-bottom:8px}
.auth-card p{color:var(--ink-light);font-size:14px;line-height:1.6;margin-bottom:24px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  padding:13px;border-radius:10px;border:1.5px solid var(--rule);background:#fff;
  font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;color:var(--ink);
  -webkit-appearance:none;text-decoration:none}
.google-btn:hover{background:var(--bg);border-color:#aaa;box-shadow:var(--shadow)}
.load-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;gap:16px;color:var(--ink-light)}
.spinner{width:38px;height:38px;border:3px solid var(--rule);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.maps-grid{display:grid;gap:14px}
.map-card{background:var(--card);border-radius:var(--radius);padding:18px 20px;
  box-shadow:var(--shadow);cursor:pointer;border:2px solid transparent;
  transition:all .18s;display:flex;align-items:center;justify-content:space-between;gap:12px}
.map-card:hover{border-color:var(--accent);box-shadow:var(--shadow-lg)}
.map-card h3{font-size:15px;font-weight:600;margin-bottom:4px}
.meta{font-size:12px;color:var(--ink-light);display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.rpill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.pill-g{background:#d4f0e2;color:var(--positive)}
.pill-y{background:#fef3d8;color:var(--warn)}
.pill-r{background:#fde8e7;color:var(--negative)}
.spill{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink-light)}
.empty-state .icon{font-size:44px;margin-bottom:14px}
.empty-state h3{font-size:20px;font-weight:600;color:var(--ink);margin-bottom:8px}
.ch-banner{background:linear-gradient(135deg,#0f1117,#1e2235);border-radius:var(--radius);
  padding:22px 24px;color:#fff;margin-bottom:20px}
.ch-banner h2{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:4px}
.ch-banner p{color:rgba(255,255,255,.5);font-size:13px}
.ch-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:600px){.ch-stats{grid-template-columns:1fr 1fr}}
.ch-stat{background:var(--card);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.ch-stat .num{font-size:28px;font-weight:700;font-family:'DM Serif Display',serif}
.ch-stat .lbl{font-size:11px;color:var(--ink-light);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.s-danger .num{color:var(--negative)}.s-warn .num{color:var(--warn)}.s-good .num{color:var(--positive)}
.ch-filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filt-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--rule);background:var(--card);
  font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--ink-light);-webkit-appearance:none}
.filt-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.ch-table{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.ch-thead{display:grid;grid-template-columns:2fr 1.2fr 1fr 90px 80px 90px;
  gap:10px;padding:10px 18px;background:#f8f8f6;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;color:var(--ink-light);border-bottom:1px solid var(--rule)}
.ch-row{display:grid;grid-template-columns:2fr 1.2fr 1fr 90px 80px 90px;
  gap:10px;padding:14px 18px;border-bottom:1px solid var(--rule);align-items:center;
  cursor:pointer;transition:background .15s}
.ch-row:last-child{border-bottom:none}
.ch-row:hover{background:#fafaf8}
@media(max-width:680px){.ch-thead{display:none}.ch-row{grid-template-columns:1fr;padding:14px 16px;gap:5px}}
.ch-primary{font-weight:600;font-size:14px}
.ch-sub{font-size:12px;color:var(--ink-light);margin-top:1px}
.prog-mini{height:5px;background:var(--rule);border-radius:3px;margin-top:4px}
.prog-mini-fill{height:5px;border-radius:3px;background:var(--accent)}
.prog-mini-fill.gd{background:var(--positive)}
.form-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.sec-hdr{background:var(--ink);color:#fff;padding:13px 20px;display:flex;align-items:center;gap:10px}
.sec-hdr h2{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400}
.sec-hdr .badge{background:var(--accent);color:#fff;border-radius:20px;font-size:11px;padding:2px 10px;font-weight:600}
.sec-body{padding:20px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:540px){.field-row{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-light)}
.req{color:var(--accent);margin-left:2px}
.field input,.field textarea{border:1.5px solid var(--rule);border-radius:8px;padding:9px 12px;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--bg);
  transition:border-color .18s;width:100%;-webkit-appearance:none}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff}
.field textarea{resize:vertical;min-height:76px}
.hint{font-size:11px;color:var(--ink-light);margin-top:2px}
.outcome-box{background:linear-gradient(135deg,#0f1117,#1e2235);border-radius:var(--radius);padding:20px;color:#fff;margin-bottom:18px}
.outcome-box .field label{color:rgba(255,255,255,.6)}
.outcome-box .field input,.outcome-box .field textarea{background:rgba(255,255,255,.09)!important;border-color:rgba(255,255,255,.18)!important;color:#fff!important}
.outcome-box .field input::placeholder,.outcome-box .field textarea::placeholder{color:rgba(255,255,255,.3)}
.outcome-box .field input:focus,.outcome-box .field textarea:focus{background:rgba(255,255,255,.14)!important;border-color:rgba(255,255,255,.45)!important}
.outcome-box .hint{color:rgba(255,255,255,.4)}
.sh-list{display:grid;gap:12px}
.sh-card{border:1.5px solid var(--rule);border-radius:10px;overflow:hidden}
.sh-hdr{background:#f8f8f6;padding:10px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap}
.type-badge{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600}
.type-E{background:#e8f4fd;color:#1a6b9e}.type-T{background:#f0e8fd;color:#6b1a9e}
.type-P{background:#e8fdf0;color:#1a9e4a}.type-G{background:#fdf8e8;color:#9e7a1a}
.sh-body{padding:12px 14px;display:grid;gap:10px}
.blk-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-light);display:block;margin-bottom:7px}
.legend-strip{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.lchip{display:inline-flex;align-items:center;padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid}
.lc-g{background:#d4f0e2;color:var(--positive);border-color:#b8e0c8}
.lc-p{background:#fde8e7;color:var(--negative);border-color:#f5c6c4}
.lc-s{background:#e8f4fd;color:#1a6b9e;border-color:#b8d8f0}
.lc-ec{background:#fef3d8;color:var(--warn);border-color:#f5d88a}
.att-scale{display:flex;gap:3px}
.att-btn{flex:1;padding:7px 2px;border-radius:6px;border:1.5px solid;font-size:9px;font-weight:700;
  cursor:pointer;text-align:center;background:#fff;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.2;-webkit-appearance:none}
.att-btn .num{font-size:12px}
.part-wrap{background:#f0f8fb;border:1.5px solid #c0dfe8;border-radius:10px;padding:12px;margin-top:3px}
.act-list{display:grid;gap:10px}
.act-row{display:grid;grid-template-columns:26px 1fr auto;gap:10px;align-items:start}
.act-num{width:26px;height:26px;border-radius:50%;background:var(--ink);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:10px}
.act-fields{display:grid;gap:7px}
.act-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:460px){.act-meta{grid-template-columns:1fr}}
.gauge-sec{background:var(--ink);color:#fff;border-radius:var(--radius);padding:20px;margin-bottom:18px}
.gauge-sec h3{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px}
.gauge-sub{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:16px}
.gauge-scale{display:flex;gap:4px;flex-wrap:wrap}
.g-btn{flex:1;min-width:60px;padding:9px 4px;border-radius:8px;border:none;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;opacity:.45;line-height:1.2;-webkit-appearance:none}
.g-btn:hover{opacity:.82}
.g-btn.gsel{opacity:1;transform:scale(1.06);box-shadow:0 4px 14px rgba(0,0,0,.3)}
.g1{background:#2a7d4f;color:#fff}.g2{background:#4a9e6b;color:#fff}.g3{background:#7cbd8e;color:#fff}
.g4{background:#a8d4b4;color:var(--ink)}.g5{background:#d4ead8;color:var(--ink)}
.g6{background:#f5e6d0;color:var(--ink)}.g7{background:#f0c899;color:var(--ink)}
.g8{background:#e89a5c;color:#fff}.g9{background:#d45e30;color:#fff}.g10{background:#c8382b;color:#fff}
.alert-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:460px){.alert-grid{grid-template-columns:1fr}}
.alert-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid var(--rule);border-radius:8px;cursor:pointer;font-size:13px;background:#fff;transition:all .15s;-webkit-user-select:none;user-select:none}
.alert-item.ach{background:#fef3d8;border-color:var(--warn)}
.chk{width:18px;height:18px;border:2px solid var(--rule);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.alert-item.ach .chk{background:var(--warn);border-color:var(--warn);color:#fff}
.mb-bar{border:1.5px solid #f5c6c4;border-radius:8px;padding:11px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px;background:#fff5f5}
.mb-bar.ok{background:#f0fdf4;border-color:#b8e0c8}
.mb-count{font-size:26px;font-weight:700;color:var(--negative)}
.mb-bar.ok .mb-count{color:var(--positive);font-size:22px}
.prog-wrap{background:var(--rule);border-radius:4px;height:6px;margin-top:8px}
.prog-fill{height:6px;border-radius:4px;background:var(--accent);transition:width .3s}
.prog-fill.gd{background:var(--positive)}
.bc{display:flex;align-items:center;gap:8px;margin-bottom:18px;font-size:13px;color:var(--ink-light)}
.bc a{color:var(--ink-light);text-decoration:none;cursor:pointer}
.bc a:hover{color:var(--accent)}
.bc .sep{color:var(--rule)}.bc .cur{color:var(--ink);font-weight:500}
.toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--ink);color:#fff;padding:12px 18px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);transform:translateY(120px);opacity:0;transition:all .3s;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ts{border-left:4px solid var(--positive)}.toast.te{border-left:4px solid var(--negative)}.toast.tw{border-left:4px solid var(--gold)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--ink-light);font-size:17px;padding:4px 6px;transition:color .15s;line-height:1;-webkit-appearance:none}
.del-btn:hover{color:var(--negative)}
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:10px;border:2px dashed var(--rule);background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:var(--ink-light);transition:all .18s;margin-top:12px;-webkit-appearance:none}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:#fff5f5}
.form-footer{display:flex;gap:10px;justify-content:flex-end;padding:16px 0;flex-wrap:wrap}
.text-muted{color:var(--ink-light);font-size:13px}
h2.pg-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:5px}
.pg-sub{color:var(--ink-light);font-size:13px;margin-bottom:20px}
.detail-strip{background:var(--card);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);margin-bottom:18px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;-webkit-overflow-scrolling:touch;overflow-y:auto;padding:20px 16px}
.overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:600px;box-shadow:var(--shadow-lg);margin:auto}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius) var(--radius) 0 0;position:sticky;top:0;background:var(--card);z-index:1}
.modal-hd h3{font-family:'DM Serif Display',serif;font-size:20px}
.modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--ink-light);line-height:1;-webkit-appearance:none;padding:2px 6px}
.modal-bd{padding:20px}.modal-ft{padding:14px 20px;border-top:1px solid var(--rule);display:flex;gap:10px;justify-content:flex-end}
.mdiv{border:none;border-top:1px solid var(--rule);margin:14px 0}
</style>
</head>
<body>
<header>
  <div class="logo">Vanto <span class="ac">Group</span><span class="sub">Strategic Map</span></div>
  <div class="hdr-right" id="hdrRight"></div>
</header>
<div class="main" id="app">
  <div class="load-wrap"><div class="spinner"></div><div>Starting up…</div></div>
</div>
<div class="toast" id="toast"></div>
<div class="overlay" id="sOverlay">
  <div class="modal">
    <div class="modal-hd"><h3 id="mTitle">Add Stakeholder</h3><button class="modal-close" onclick="closeSM()">✕</button></div>

      <button class="btn btn-outline" onclick="closeSM()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSH()">Save Stakeholder</button>
    </div>
  </div>
</div>
<script>
var CLIENT_ID    = '569636278695-rf4palrjq7mtbkdn3socphh5h1dftrd5.apps.googleusercontent.com';
var FOLDER_ID    = '1WKkJpprL2GENFHOux7Whut7LuRy_im8V';
var REDIRECT     = location.origin + location.pathname;
var TOKEN_PROXY  = 'https://vanto-auth-proxy.vercel.app/api/token';
var SCOPES       = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email';
var INDEX_FILE   = 'vanto_sm_index.json';
var INDIA_ADMINS = ["nirav.hiral@gmail.com"];

// ATTITUDE = G/P/S/EC (quality of relationship with this person about the business)
var ATT=[
  {c:'G',l:'Growth',d:'Developing positively — active investment in relationship',col:'#2a7d4f'},
  {c:'P',l:'Problematic',d:'Active issues or barriers undermining the relationship',col:'#c8382b'},

  {c:'EC',l:'Excess Confidence',d:'Overconfidence — risk of complacency on either side',col:'#e67e22'}
];

// PARTNERSHIP LEVEL = -4 to +4 scale (how person feels about the deal)
var PART=[
  {v:-4,s:'O/C Opp',l:'Overtly/Covertly Opposed'},
  {v:-3,s:'H.Res',l:'Highly Resistant'},
  {v:-2,s:'Subm',l:'Submissive'},
  {v:-1,s:'Unint',l:'Uninterested'},
  {v:1,s:'Accpt',l:'Accepting'},
  {v:2,s:'Agree',l:'In Agreement'},
  {v:3,s:'Supp',l:'Supportive'},
  {v:4,s:'Def',l:'Enthusiastic Defender'}
];

var ITYPES=[
  {c:'E',l:'Economic / Financial',d:'Controls budget & final sign-off'},
  {c:'T',l:'Technical',d:'Evaluates fit, specs, compliance'},
  {c:'P',l:'Pragmatic',d:'Day-to-day user of the solution'},
  {c:'G',l:'Guardian Angel',d:'Internal champion on your side'}
];
var GAUGE=['Euphoria','Enthusiasm','Security','Comfort','OK','Concern','Discomfort','Worry','Fear','Panic'];
var ALERTS=['Lacking Basic Information','Uncertainty about Info','Unidentified Influence','Market Situation / Changes','New People','Reorganisation or Other Circumstances','Excess Confidence (EC)'];

var token=null,currentUser=null,maps=[],driveIndex={},indexFileId=null;
var view='loading',activeId=null,form={},tmp={},editIdx=null,chFilter='all',syncing=false;

function base64url(buf){return btoa(String.fromCharCode.apply(null,new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
function genVerifier(){var arr=new Uint8Array(32);crypto.getRandomValues(arr);return base64url(arr);}
function genChallenge(v){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)).then(function(b){return base64url(b);});}
function parseQuery(s){var r={};s.replace(/^\?/,'').split('&').forEach(function(p){if(!p)return;var k=p.split('=');r[decodeURIComponent(k[0])]=decodeURIComponent(k[1]||'');});return r;}

window.addEventListener('load',function(){
  var p=parseQuery(location.search);
  if(p.code&&p.state){
    var ss=sessionStorage.getItem('vsm_state'),sv=sessionStorage.getItem('vsm_verifier');
    history.replaceState(null,'',location.pathname);
    if(p.state!==ss||!sv){showToast('Auth state mismatch','te');showAuthScreen();return;}
    showLoading('Completing sign in…');exchangeCode(p.code,sv);return;
  }
  var tok=sessionStorage.getItem('vsm_tok'),usr=sessionStorage.getItem('vsm_usr');
  if(tok&&usr){try{token=tok;currentUser=JSON.parse(usr);finishAuth();return;}catch(e){sessionStorage.clear();}}
  if(tok){token=tok;showLoading('Signing in…');fetchUserInfo().then(finishAuth).catch(function(){sessionStorage.clear();showAuthScreen();});return;}
  showAuthScreen();
});

function signIn(){
  var ver=genVerifier(),st=genVerifier();
  sessionStorage.setItem('vsm_verifier',ver);sessionStorage.setItem('vsm_state',st);
  genChallenge(ver).then(function(ch){
    location.href='https://accounts.google.com/o/oauth2/v2/auth?'+
      ['client_id='+encodeURIComponent(CLIENT_ID),'redirect_uri='+encodeURIComponent(REDIRECT),
       'response_type=code','scope='+encodeURIComponent(SCOPES),'code_challenge='+ch,
       'code_challenge_method=S256','state='+st,'access_type=online','prompt=select_account'].join('&');
  });
}

function exchangeCode(code,ver){
  fetch(TOKEN_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code,code_verifier:ver,redirect_uri:REDIRECT})})
  .then(function(r){return r.json();}).then(function(d){
    if(!d.access_token){showToast('Sign-in failed: '+(d.error_description||d.error||'unknown'),'te');showAuthScreen();return;}
    token=d.access_token;sessionStorage.setItem('vsm_tok',token);
    sessionStorage.removeItem('vsm_verifier');sessionStorage.removeItem('vsm_state');
    fetchUserInfo().then(finishAuth).catch(function(){sessionStorage.clear();showAuthScreen();});
  }).catch(function(){showToast('Sign-in failed — check connection','te');showAuthScreen();});
}

function signOut(){sessionStorage.clear();token=null;currentUser=null;maps=[];driveIndex={};renderHeader();showAuthScreen();}
function fetchUserInfo(){
  return fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{'Authorization':'Bearer '+token}})
  .then(function(r){if(!r.ok)throw new Error();return r.json();})
  .then(function(i){currentUser={email:i.email||'',name:i.name||i.email||'User',picture:i.picture||''};sessionStorage.setItem('vsm_usr',JSON.stringify(currentUser));});
}

function setSyncing(v){syncing=v;var d=document.getElementById('syncDot');if(d)d.className='sync-dot'+(v?' syncing':'');}

function dGet(path,params){var url='https://www.googleapis.com/drive/v3/'+path;if(params)url+='?'+Object.keys(params).map(function(k){return k+'='+encodeURIComponent(params[k]);}).join('&');return fetch(url,{headers:{'Authorization':'Bearer '+token}}).then(function(r){return r.json();});}
function dPost(meta){return fetch('https://www.googleapis.com/drive/v3/files?fields=id',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(meta)}).then(function(r){return r.json();});}
function dRead(id){return fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{'Authorization':'Bearer '+token}}).then(function(r){return r.json();});}
function dWrite(id,data){var fd=new FormData();fd.append('metadata',new Blob(['{}'],{type:'application/json'}));fd.append('file',new Blob([JSON.stringify(data)],{type:'application/json'}));return fetch('https://www.googleapis.com/upload/drive/v3/files/'+id+'?uploadType=multipart',{method:'PATCH',headers:{'Authorization':'Bearer '+token},body:fd}).then(function(r){return r.json();});}
function dCreate(name,data){return dPost({name:name,parents:[FOLDER_ID],mimeType:'application/json'}).then(function(m){return dWrite(m.id,data).then(function(){return m.id;});});}
function dDelete(id){return fetch('https://www.googleapis.com/drive/v3/files/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});}

function loadAllMaps(){
  var q="name='"+INDEX_FILE+"' and '"+FOLDER_ID+"' in parents and trashed=false";
  return dGet('files',{q:q,fields:'files(id,name)'}).then(function(res){
    if(res.files&&res.files.length){
      indexFileId=res.files[0].id;
      return dRead(indexFileId).then(function(idx){
        driveIndex=idx.fileMap||{};
        return Promise.all(Object.keys(driveIndex).map(function(id){return dRead(driveIndex[id]).catch(function(){return null;});}))
        .then(function(results){maps=results.filter(function(m){return m!==null;});});
      });
    } else {driveIndex={};maps=[];return dCreate(INDEX_FILE,{fileMap:{},version:1}).then(function(id){indexFileId=id;});}
  }).catch(function(){showToast('Could not load from Drive','te');maps=[];});
}
function saveMapToDrive(m){
  setSyncing(true);var fid=driveIndex[m.id];
  var p=fid?dWrite(fid,m):dCreate('vsm_'+m.id+'.json',m).then(function(nid){driveIndex[m.id]=nid;return dWrite(indexFileId,{fileMap:driveIndex,version:1});});
  return p.then(function(){showToast('Saved to Google Drive ✓','ts');}).catch(function(){showToast('Sync failed','tw');}).then(function(){setSyncing(false);});
}
function deleteMapFromDrive(mapId){
  var fid=driveIndex[mapId];if(!fid)return Promise.resolve();setSyncing(true);
  return dDelete(fid).then(function(){delete driveIndex[mapId];return dWrite(indexFileId,{fileMap:driveIndex,version:1});}).catch(function(){}).then(function(){setSyncing(false);});
}

function esc(s){if(s===null||s===undefined)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(v){if(!v)return '—';var p=v.substring(0,10).split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:v;}
function timeAgo(iso){var d=Math.floor((Date.now()-new Date(iso))/1000);if(d<60)return 'Just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';if(d<604800)return Math.floor(d/86400)+'d ago';return fmtDate(new Date(iso).toISOString().substring(0,10));}
function calcMissing(m){var c=0;if(!m.client)c++;if(!m.outcome)c++;if(!m.accountable)c++;if(!m.byWhen)c++;(m.stakeholders||[]).forEach(function(s){if(!s.name)c++;if(!s.attitude)c++;if(s.partnershipLevel===''||s.partnershipLevel===null||s.partnershipLevel===undefined)c++;if(!s.winResult)c++;});return c;}
function calcPct(m){var mis=calcMissing(m),tot=8+((m.stakeholders||[]).length*4);return Math.round(((tot-mis)/tot)*100);}
function daysUntil(ds){var d=Math.round((new Date(ds)-Date.now())/86400000);if(d<0)return '<span style="color:var(--negative)">'+Math.abs(d)+'d overdue</span>';if(d===0)return '<span style="color:var(--negative)">Today!</span>';if(d<=30)return '<span style="color:var(--warn)">'+d+'d left</span>';return d+'d left';}
function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'ts');setTimeout(function(){t.classList.remove('show');},3500);}

function shCard(s,i,editable){
  var tObj=ITYPES.filter(function(t){return t.c===s.type;})[0]||{};
  var attObj=ATT.filter(function(a){return a.c===s.attitude;})[0];
  var attLabel=attObj?attObj.c+' — '+attObj.l:'—';
  var attColor=s.attitude==='G'?'color:var(--positive)':s.attitude==='P'?'color:var(--negative)':s.attitude==='EC'?'color:var(--warn)':'color:var(--teal)';
  var partObj=PART.filter(function(p){return p.v==s.partnershipLevel;})[0];
  var partLabel=partObj?(partObj.v>0?'+':'')+partObj.v+' — '+partObj.l:'—';
  var partColor=(s.partnershipLevel<0)?'color:var(--negative)':(s.partnershipLevel>0)?'color:var(--positive)':'color:#555';
  return '<div class="sh-card"><div class="sh-hdr"><div><div style="font-weight:600;font-size:15px">'+esc(s.name||'Unnamed')+'</div><div style="font-size:12px;color:var(--ink-light);margin-top:2px">'+esc(s.role||'')+'</div></div><div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap"><span class="type-badge type-'+(s.type||'E')+'">'+(s.type||'?')+' — '+esc(tObj.l||'')+'</span>'+(editable?'<button class="btn btn-outline btn-sm" onclick="openSM('+i+')">Edit</button><button class="del-btn" onclick="remSH('+i+')">🗑</button>':'')+' </div></div><div class="sh-body"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;font-size:13px"><div><div style="font-size:10px;font-weight:600;text-transform:uppercase;color:var(--ink-light);margin-bottom:3px">Attitude</div><div style="font-weight:600;'+attColor+'">'+attLabel+'</div></div><div><div style="font-size:10px;font-weight:600;text-transform:uppercase;color:var(--ink-light);margin-bottom:3px">Partnership Level</div><div style="font-weight:600;'+partColor+'">'+partLabel+'</div></div><div><div style="font-size:10px;font-weight:600;text-transform:uppercase;color:var(--ink-light);margin-bottom:3px">Missing Info</div><div style="font-weight:600;'+(!s.missing?'color:var(--positive)':'color:var(--warn)')+'">'+esc(s.missing||'None')+'</div></div></div>'+(s.winResult?'<div style="font-size:12px;background:var(--bg);padding:8px 10px;border-radius:6px"><strong>Personal win result:</strong> '+esc(s.winResult)+'</div>':'')+(s.orgResult?'<div style="font-size:12px;background:var(--bg);padding:8px 10px;border-radius:6px"><strong>Org result:</strong> '+esc(s.orgResult)+'</div>':'')+'</div></div>';
}

function renderDetail(){
  var m=maps.filter(function(x){return x.id===activeId;})[0];if(!m)return '<p>Map not found.</p>';
  var p=calcPct(m),mis=calcMissing(m),pColor=p>=80?'var(--positive)':p>=50?'var(--warn)':'var(--negative)';
  var readLabel=(m.readiness!==null&&m.readiness!==undefined)?GAUGE[m.readiness]:'—';
  var alertHtml=m.alerts&&m.alerts.length?m.alerts.map(function(a){return '<span class="spill" style="background:#fef3d8;color:var(--warn)">⚠ '+esc(a)+'</span>';}).join(''):'<span class="text-muted">None</span>';
  var stakeHtml=(m.stakeholders||[]).length?(m.stakeholders||[]).map(function(s,i){return shCard(s,i,false);}).join(''):'<p class="text-muted">No stakeholders recorded.</p>';
  var actHtml=(m.actions||[]).filter(function(a){return a.text;}).map(function(a,i){return '<div style="display:grid;grid-template-columns:26px 1fr 120px 90px;gap:10px;align-items:start;padding:10px;background:var(--bg);border-radius:8px"><div class="act-num">'+(i+1)+'</div><div style="font-size:14px">'+esc(a.text)+'</div><div style="font-size:12px;color:var(--ink-light)">'+esc(a.who)+'</div><div style="font-size:12px;color:var(--ink-light)">'+(a.when?fmtDate(a.when):'—')+'</div></div>';}).join('')||'<p class="text-muted">No actions recorded.</p>';
  var fromList=(isAdmin()&&m.owner!==currentUser.email)?'dashboard':'list';
  return '<div class="bc"><a onclick="showView(\''+fromList+'\')">'+(fromList==='dashboard'?'India Dashboard':'My Maps')+'</a><span class="sep">›</span><span class="cur">'+esc(m.client)+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px"><div><h2 class="pg-title">'+esc(m.client)+'</h2><p class="text-muted">'+(m.title?esc(m.title)+' · ':'')+esc(m.accountable||'')+(m.byWhen?' · Close by '+fmtDate(m.byWhen):'')+'</p></div><div style="display:flex;gap:8px;flex-shrink:0"><button class="btn btn-outline" onclick="editMap(\''+m.id+'\')">✏️ Edit</button><button class="btn btn-danger" onclick="delMap(\''+m.id+'\')">🗑 Delete</button></div></div>'+
    '<div class="detail-strip"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:600">Map Completeness</div><div style="font-weight:700;font-size:22px;color:'+pColor+'">'+p+'%</div></div><div class="prog-wrap"><div class="prog-fill'+(p>=80?' gd':'')+'" style="width:'+p+'%"></div></div><div style="margin-top:12px;display:flex;gap:16px;flex-wrap:wrap;font-size:13px"><span>🎯 Readiness: <strong>'+readLabel+'</strong></span><span>⚠ Alerts: <strong>'+(m.alerts?m.alerts.length:0)+'</strong></span><span>🚩 Missing: <strong>'+mis+' field'+(mis!==1?'s':'')+'</strong></span><span>📅 Updated: <strong>'+timeAgo(m.updatedAt)+'</strong></span></div></div>'+
    '<div style="background:linear-gradient(135deg,#0f1117,#1e2235);border-radius:var(--radius);padding:20px;color:#fff;margin-bottom:18px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.4);margin-bottom:5px">Identified Urgent Case for Action</div><div style="font-size:15px;line-height:1.7">'+(m.urgentCase?esc(m.urgentCase):'<span style="opacity:.4">Not defined</span>')+'</div></div>'+
    '<div style="background:linear-gradient(135deg,#0f1117,#1e2235);border-radius:var(--radius);padding:20px;color:#fff;margin-bottom:18px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.4);margin-bottom:5px">Specific Outcome</div><div style="font-size:16px;line-height:1.6">'+(m.outcome?esc(m.outcome):'<span style="opacity:.4">Not defined</span>')+'</div></div>'+
    '<div class="form-card"><div class="sec-hdr"><h2>Stakeholders</h2><span class="badge">'+(m.stakeholders||[]).length+'</span></div><div class="sec-body"><div class="sh-list">'+stakeHtml+'</div></div></div>'+
    '<div class="form-card"><div class="sec-hdr"><h2>Strategic Actions</h2></div><div class="sec-body"><div style="display:grid;gap:8px">'+actHtml+'</div></div></div>'+
    '<div class="detail-strip"><div style="font-weight:600;margin-bottom:10px">Alerts</div><div style="display:flex;gap:8px;flex-wrap:wrap">'+alertHtml+'</div></div>';
}

function setReadiness(i){form.readiness=form.readiness===i?null:i;render();}
function togAlert(a){if(!form.alerts)form.alerts=[];var i=form.alerts.indexOf(a);i>=0?form.alerts.splice(i,1):form.alerts.push(a);render();}
function addAction(){form.actions.push({text:'',who:'',when:''});render();}
function remAction(i){form.actions.splice(i,1);render();}
function remSH(i){form.stakeholders.splice(i,1);render();}
function doSaveMap(){var m=JSON.parse(JSON.stringify(form));if(!m.client.trim()){showToast('Client name is required','te');return;}if(!m.outcome.trim()){showToast('Specific outcome is required','te');return;}m.updatedAt=new Date().toISOString();var idx=-1;for(var i=0;i<maps.length;i++){if(maps[i].id===m.id){idx=i;break;}}if(idx>=0)maps[idx]=m;else maps.push(m);form=m;showView('detail',m.id);saveMapToDrive(m);}
function editMap(id){for(var i=0;i<maps.length;i++){if(maps[i].id===id){form=JSON.parse(JSON.stringify(maps[i]));break;}}view='new';render();window.scrollTo({top:0,behavior:'smooth'});}
function delMap(id){if(!confirm('Delete this strategic map? This cannot be undone.'))return;maps=maps.filter(function(x){return x.id!==id;});deleteMapFromDrive(id);showToast('Map deleted');showView('list');}

function openSM(idx){
  editIdx=(idx!==undefined)?idx:null;
  tmp=(idx!==undefined)?JSON.parse(JSON.stringify(form.stakeholders[idx])):{name:'',role:'',type:'E',attitude:'',partnershipLevel:'',winResult:'',orgResult:'',missing:''};
  document.getElementById('mTitle').textContent=(idx!==undefined)?'Edit Stakeholder':'Add Stakeholder';
  document.getElementById('mBody').innerHTML=renderSHForm();
  document.getElementById('sOverlay').classList.add('open');
}
function closeSM(){document.getElementById('sOverlay').classList.remove('open');}
function saveSH(){if(!tmp.name||!tmp.name.trim()){showToast('Name is required','te');return;}var copy=JSON.parse(JSON.stringify(tmp));if(editIdx!==null&&editIdx>=0)form.stakeholders[editIdx]=copy;else form.stakeholders.push(copy);closeSM();render();}

function renderSHForm(){
  var typeHtml=ITYPES.map(function(t){
    var sel=tmp.type===t.c;
    return '<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid '+(sel?'var(--teal)':'var(--rule)')+';border-radius:8px;cursor:pointer;background:'+(sel?'#f0f9fa':'#fff')+';font-size:13px;transition:all .15s" onclick="setTT(\''+t.c+'\')"><strong style="color:var(--teal);min-width:22px;font-size:14px">'+t.c+'</strong><div><div style="font-weight:600">'+t.l+'</div><div style="font-size:11px;color:var(--ink-light)">'+t.d+'</div></div></div>';
  }).join('');

  // ATTITUDE = G / P / S / EC buttons
  var attHtml=ATT.map(function(a){
    var sel=tmp.attitude===a.c;
    var bg=sel?'background:'+a.col+';color:#fff;border-color:'+a.col+';':
      a.c==='G'?'background:#f0fdf4;color:var(--positive);border-color:#b8e0c8;':
      a.c==='P'?'background:#fff5f5;color:var(--negative);border-color:#f5c6c4;':
      a.c==='EC'?'background:#fffbf0;color:var(--warn);border-color:#f5d88a;':
      'background:#f0f8fb;color:var(--teal);border-color:#b8d8f0;';
    return '<button style="flex:1;padding:14px 4px;border-radius:8px;border:1.5px solid;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;'+bg+'-webkit-appearance:none" onclick="setTA(\''+a.c+'\')"><div style="font-size:20px;font-weight:800">'+a.c+'</div><div style="font-size:10px;margin-top:4px;font-weight:600">'+a.l+'</div></button>';
  }).join('');

  // PARTNERSHIP LEVEL = -4 to +4 scale buttons
  var partHtml=PART.map(function(p){
    var sel=tmp.partnershipLevel!==''&&tmp.partnershipLevel!==null&&tmp.partnershipLevel!==undefined&&Number(tmp.partnershipLevel)===p.v;
    var base=p.v<0?'border-color:#f5c6c4;background:#fff9f9;color:var(--negative);':'border-color:#b8e0c8;background:#f5fdf8;color:var(--positive);';
    var selStyle=p.v<0?'background:var(--negative);color:#fff;border-color:var(--negative);':'background:var(--positive);color:#fff;border-color:var(--positive);';
    return '<button class="att-btn" style="'+(sel?selStyle:base)+'" onclick="setTP('+p.v+')" title="'+p.l+'"><span class="num">'+(p.v>0?'+':'')+p.v+'</span><span style="font-size:8px">'+p.s+'</span></button>';
  }).join('');

  var selAtt=ATT.filter(function(a){return a.c===tmp.attitude;})[0];
  var selPart=PART.filter(function(p){return p.v==tmp.partnershipLevel;})[0];

  return '<div style="display:grid;gap:16px">' +
    '<div class="field-row" style="margin-bottom:0">' +
      '<div class="field"><label>FULL NAME <span class="req">*</span></label><input type="text" placeholder="First Last" value="'+esc(tmp.name)+'" oninput="tmp.name=this.value"></div>' +
      '<div class="field"><label>JOB TITLE / ROLE</label><input type="text" placeholder="e.g. CFO, HR Director" value="'+esc(tmp.role)+'" oninput="tmp.role=this.value"></div>' +
    '</div>' +
    '<div class="field"><label>BUYING INFLUENCE TYPE</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+typeHtml+'</div></div>' +
    '<hr class="mdiv">' +
    '<div>' +
      '<span class="blk-label">ATTITUDE (of person about the business)</span>' +
      '<div class="legend-strip">' +
        '<span class="lchip lc-g">G = Growth</span>' +
        '<span class="lchip lc-p">P = Problematic</span>' +
        '<span class="lchip lc-s">S = Stable</span>' +
        '<span class="lchip lc-ec">EC = Excess Confidence</span>' +
      '</div>' +
      '<div style="display:flex;gap:8px;">'+attHtml+'</div>' +
      (selAtt?'<div style="margin-top:8px;font-size:12px;color:var(--ink-light);font-style:italic;background:var(--bg);padding:8px 10px;border-radius:6px"><strong>'+selAtt.c+':</strong> '+selAtt.d+'</div>':'') +
    '</div>' +
    '<hr class="mdiv">' +
    '<div>' +
      '<span class="blk-label">PARTNERSHIP LEVEL — How this person feels about the deal</span>' +
      '<div class="legend-strip">' +
        '<span class="lchip lc-p">Negative (-4 to -1) = Opposed / Resistant</span>' +
        '<span class="lchip lc-g">Positive (+1 to +4) = Accepting / Supportive</span>' +
      '</div>' +
      '<div class="att-scale">'+partHtml+'</div>' +
      (selPart?'<div style="margin-top:7px;font-size:12px;color:var(--ink-light);font-style:italic">Selected: <strong>'+selPart.l+'</strong></div>':'') +
    '</div>' +
    '<hr class="mdiv">' +
    '<div class="field"><label>WHAT\'S IN IT FOR THIS PERSON? (Personal Win Result)</label><textarea placeholder="What does this person personally gain — career, recognition, avoiding blame…" oninput="tmp.winResult=this.value" style="min-height:60px">'+esc(tmp.winResult)+'</textarea></div>' +
    '<div class="field"><label>WHAT\'S IN IT FOR THEM INSIDE THE COMPANY? (Org Result)</label><textarea placeholder="What business/organisational results do they need to demonstrate?" oninput="tmp.orgResult=this.value" style="min-height:60px">'+esc(tmp.orgResult)+'</textarea></div>' +
    '<div class="field"><label>WHAT\'S MISSING?</label><input type="text" placeholder="What don\'t you yet know or need to get from/about this person?" value="'+esc(tmp.missing)+'" oninput="tmp.missing=this.value"></div>' +
    '</div>';
}

function setTA(c){tmp.attitude=(tmp.attitude===c?'':c);document.getElementById('mBody').innerHTML=renderSHForm();}
function setTP(v){tmp.partnershipLevel=(tmp.partnershipLevel==v?'':v);document.getElementById('mBody').innerHTML=renderSHForm();}
function setTT(c){tmp.type=c;document.getElementById('mBody').innerHTML=renderSHForm();}
</script>
</body>
</html>
