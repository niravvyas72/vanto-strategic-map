<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanto Group — Strategic Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#0f1117; --ink-light:#4a4f5e; --rule:#e2e4ea;
    --bg:#f5f5f2; --card:#fff; --accent:#c8382b; --accent-dark:#9e2820;
    --positive:#2a7d4f; --negative:#c8382b; --warn:#e67e22; --teal:#1a6b7a;
    --gold:#c8972b;
    --radius:12px; --shadow:0 2px 12px rgba(15,17,23,.07); --shadow-lg:0 8px 40px rgba(15,17,23,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

  /* ── Header ── */
  header{background:var(--ink);color:#fff;padding:14px 22px;display:flex;align-items:center;
    justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.3)}
  .logo{font-family:'DM Serif Display',serif;font-size:19px}
  .logo .ac{color:var(--accent)}
  .logo .sub{color:rgba(255,255,255,.38);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:300;margin-left:10px}
  .hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .user-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.1);
    border-radius:20px;padding:5px 12px 5px 5px;font-size:12px;font-weight:500}
  .user-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover}
  .user-avatar-init{width:26px;height:26px;border-radius:50%;background:var(--accent);
    color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;flex-shrink:0}
  .sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite}
  .sync-dot.offline{background:#999}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;
    font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .18s}
  .btn-ghost{background:rgba(255,255,255,.1);color:#fff}
  .btn-ghost:hover{background:rgba(255,255,255,.2)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-dark);transform:translateY(-1px)}
  .btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--rule)}
  .btn-outline:hover{background:var(--bg)}
  .btn-gold{background:var(--gold);color:#fff}
  .btn-gold:hover{background:#a87825;transform:translateY(-1px)}
  .btn-sm{padding:5px 11px;font-size:12px}

  .main{max-width:960px;margin:0 auto;padding:26px 16px 80px}

  /* ── Auth screen ── */
  .auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:70vh;text-align:center;gap:20px;padding:40px 20px}
  .auth-screen .big-logo{font-family:'DM Serif Display',serif;font-size:36px;margin-bottom:4px}
  .auth-screen .big-logo span{color:var(--accent)}
  .auth-card{background:var(--card);border-radius:16px;padding:36px 40px;max-width:400px;
    width:100%;box-shadow:var(--shadow-lg);text-align:center}
  .auth-card h2{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:8px}
  .auth-card p{color:var(--ink-light);font-size:14px;line-height:1.6;margin-bottom:24px}
  .google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    padding:13px;border-radius:10px;border:1.5px solid var(--rule);background:#fff;
    font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;color:var(--ink)}
  .google-btn:hover{background:#f5f5f2;border-color:#aaa;transform:translateY(-1px);box-shadow:var(--shadow)}
  .google-icon{width:20px;height:20px}

  /* ── Loading ── */
  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:60vh;gap:16px;color:var(--ink-light)}
  .spinner{width:40px;height:40px;border:3px solid var(--rule);border-top-color:var(--accent);
    border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── List ── */
  .maps-grid{display:grid;gap:14px}
  .map-card{background:var(--card);border-radius:var(--radius);padding:18px 22px;
    box-shadow:var(--shadow);cursor:pointer;border:2px solid transparent;
    transition:all .18s;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .map-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
  .map-card h3{font-size:15px;font-weight:600;margin-bottom:4px}
  .meta{font-size:12px;color:var(--ink-light);display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
  .rpill{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
  .pill-green{background:#d4f0e2;color:var(--positive)}
  .pill-yellow{background:#fef3d8;color:var(--warn)}
  .pill-red{background:#fde8e7;color:var(--negative)}
  .spill{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}

  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-light)}
  .empty-state .icon{font-size:48px;margin-bottom:16px}
  .empty-state h3{font-size:20px;font-weight:600;color:var(--ink);margin-bottom:8px}

  /* ── Country Head Dashboard ── */
  .ch-header{background:linear-gradient(135deg,#0f1117,#1e2235);border-radius:var(--radius);
    padding:24px 26px;color:#fff;margin-bottom:22px}
  .ch-header h2{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:4px}
  .ch-header p{color:rgba(255,255,255,.55);font-size:13px}
  .ch-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
  @media(max-width:600px){.ch-stats{grid-template-columns:1fr 1fr}}
  .ch-stat{background:var(--card);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .ch-stat .num{font-size:28px;font-weight:700;font-family:'DM Serif Display',serif}
  .ch-stat .lbl{font-size:11px;color:var(--ink-light);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
  .ch-stat.danger .num{color:var(--negative)}
  .ch-stat.warn .num{color:var(--warn)}
  .ch-stat.good .num{color:var(--positive)}

  .ch-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .filter-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--rule);
    background:var(--card);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--ink-light)}
  .filter-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  .ch-table{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .ch-table-header{display:grid;grid-template-columns:2fr 1.2fr 1fr 90px 80px 80px;
    gap:12px;padding:11px 18px;background:#f8f8f6;font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:.6px;color:var(--ink-light);border-bottom:1px solid var(--rule)}
  .ch-row{display:grid;grid-template-columns:2fr 1.2fr 1fr 90px 80px 80px;
    gap:12px;padding:14px 18px;border-bottom:1px solid var(--rule);align-items:center;
    cursor:pointer;transition:background .15s}
  .ch-row:last-child{border-bottom:none}
  .ch-row:hover{background:#fafaf8}
  @media(max-width:700px){
    .ch-table-header{display:none}
    .ch-row{grid-template-columns:1fr;padding:14px 16px;gap:6px}
  }
  .ch-cell-primary{font-weight:600;font-size:14px}
  .ch-cell-sub{font-size:12px;color:var(--ink-light);margin-top:1px}
  .prog-mini{height:5px;background:var(--rule);border-radius:3px;margin-top:4px;width:80px}
  .prog-mini-fill{height:5px;border-radius:3px;background:var(--accent)}
  .prog-mini-fill.gd{background:var(--positive)}
  .alert-dot{width:8px;height:8px;border-radius:50%;background:var(--warn);display:inline-block;margin-right:4px}

  /* ── Form Cards ── */
  .form-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .sec-hdr{background:var(--ink);color:#fff;padding:13px 22px;display:flex;align-items:center;gap:10px}
  .sec-hdr h2{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400}
  .sec-hdr .badge{background:var(--accent);color:#fff;border-radius:20px;font-size:11px;padding:2px 10px;font-weight:600}
  .sec-body{padding:20px 22px}
  .section-gap{margin-bottom:20px}

  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  @media(max-width:560px){.field-row{grid-template-columns:1fr}}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-light)}
  .req{color:var(--accent);margin-left:2px}
  .field input,.field textarea{border:1.5px solid var(--rule);border-radius:8px;padding:9px 13px;
    font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--bg);
    transition:border-color .18s;width:100%}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff}
  .field textarea{resize:vertical;min-height:76px}
  .hint{font-size:11px;color:var(--ink-light);margin-top:2px}

  .outcome-box{background:linear-gradient(135deg,#0f1117,#1e2235);
    border-radius:var(--radius);padding:22px;color:#fff;margin-bottom:20px}
  .outcome-box .field label{color:rgba(255,255,255,.6)}
  .outcome-box .field input,.outcome-box .field textarea{
    background:rgba(255,255,255,.09)!important;border-color:rgba(255,255,255,.18)!important;color:#fff!important}
  .outcome-box .field input::placeholder,.outcome-box .field textarea::placeholder{color:rgba(255,255,255,.3)}
  .outcome-box .field input:focus,.outcome-box .field textarea:focus{
    background:rgba(255,255,255,.14)!important;border-color:rgba(255,255,255,.45)!important}
  .outcome-box .hint{color:rgba(255,255,255,.4)}

  /* Stakeholder cards */
  .sh-list{display:grid;gap:14px}
  .sh-card{border:1.5px solid var(--rule);border-radius:10px;overflow:hidden}
  .sh-hdr{background:#f8f8f6;padding:11px 15px;display:flex;align-items:flex-start;
    justify-content:space-between;gap:8px;flex-wrap:wrap}
  .type-badge{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600}
  .type-E{background:#e8f4fd;color:#1a6b9e}
  .type-T{background:#f0e8fd;color:#6b1a9e}
  .type-U{background:#e8fdf0;color:#1a9e4a}
  .type-G{background:#fdf8e8;color:#9e7a1a}
  .sh-body{padding:13px 15px;display:grid;gap:10px}

  /* Attitude */
  .block-label{font-size:11px;font-weight:600;text-transform:uppercase;
    letter-spacing:.8px;color:var(--ink-light);display:block;margin-bottom:7px}
  .legend-strip{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
  .lchip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;
    border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid}
  .lc-growth{background:#d4f0e2;color:var(--positive);border-color:#b8e0c8}
  .lc-prob{background:#fde8e7;color:var(--negative);border-color:#f5c6c4}
  .lc-stable{background:#e8f4fd;color:#1a6b9e;border-color:#b8d8f0}
  .lc-ec{background:#fef3d8;color:var(--warn);border-color:#f5d88a}

  .att-scale{display:flex;gap:3px}
  .att-btn{flex:1;padding:7px 2px;border-radius:6px;border:1.5px solid;
    font-size:9px;font-weight:700;cursor:pointer;text-align:center;background:#fff;
    transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.2}
  .att-btn .num{font-size:12px}
  .att-neg{border-color:#f5c6c4;background:#fff9f9;color:var(--negative)}
  .att-neu{border-color:#d4d4d4;background:#fafafa;color:#555}
  .att-pos{border-color:#b8e0c8;background:#f5fdf8;color:var(--positive)}
  .att-sel-neg{background:var(--negative);color:#fff;border-color:var(--negative)}
  .att-sel-pos{background:var(--positive);color:#fff;border-color:var(--positive)}
  .att-sel-neu{background:#555;color:#fff;border-color:#555}

  .part-wrap{background:#f0f8fb;border:1.5px solid #c0dfe8;border-radius:10px;padding:13px;margin-top:3px}
  .part-scale{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1.5px solid #c0dfe8}
  .par-btn{flex:1;padding:11px 4px;border:none;border-right:1px solid #c0dfe8;
    font-size:10px;font-weight:700;cursor:pointer;text-align:center;background:#fff;
    transition:all .15s;line-height:1.3}
  .par-btn:last-child{border-right:none}
  .par-btn:hover:not(.par-sel){background:#e0f0f5}
  .par-btn.par-sel{color:#fff}
  .par-code{font-size:15px;display:block;margin-bottom:2px}
  .par-name{font-size:9px;font-weight:500}

  /* Actions */
  .act-list{display:grid;gap:10px}
  .act-row{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:start}
  .act-idx{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;
    font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;margin-top:10px}
  .act-fields{display:grid;gap:7px}
  .act-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  @media(max-width:480px){.act-meta{grid-template-columns:1fr}}

  /* Gauge */
  .gauge-sec{background:var(--ink);color:#fff;border-radius:var(--radius);padding:22px;margin-top:20px}
  .gauge-sec h3{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px}
  .gauge-sub{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:18px}
  .gauge-scale{display:flex;gap:4px;flex-wrap:wrap}
  .gauge-btn{flex:1;min-width:62px;padding:9px 4px;border-radius:8px;border:none;
    font-size:11px;font-weight:600;cursor:pointer;text-align:center;
    transition:all .15s;opacity:.45;line-height:1.2}
  .gauge-btn:hover{opacity:.82}
  .gauge-btn.gsel{opacity:1;transform:scale(1.07);box-shadow:0 4px 14px rgba(0,0,0,.35)}
  .g1{background:#2a7d4f;color:#fff}.g2{background:#4a9e6b;color:#fff}.g3{background:#7cbd8e;color:#fff}
  .g4{background:#a8d4b4;color:var(--ink)}.g5{background:#d4ead8;color:var(--ink)}
  .g6{background:#f5e6d0;color:var(--ink)}.g7{background:#f0c899;color:var(--ink)}
  .g8{background:#e89a5c;color:#fff}.g9{background:#d45e30;color:#fff}.g10{background:#c8382b;color:#fff}

  /* Alerts */
  .alert-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  @media(max-width:480px){.alert-grid{grid-template-columns:1fr}}
  .alert-item{display:flex;align-items:center;gap:8px;padding:9px 12px;
    border:1.5px solid var(--rule);border-radius:8px;cursor:pointer;
    font-size:13px;background:#fff;transition:all .15s;user-select:none}
  .alert-item:hover{border-color:var(--warn)}
  .alert-item.ach{background:#fef3d8;border-color:var(--warn)}
  .chk{width:18px;height:18px;border:2px solid var(--rule);border-radius:4px;
    display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
  .alert-item.ach .chk{background:var(--warn);border-color:var(--warn);color:#fff}

  /* Missing bar */
  .mb-bar{background:#fff5f5;border:1.5px solid #f5c6c4;border-radius:8px;
    padding:11px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .mb-bar.good{background:#f0fdf4;border-color:#b8e0c8}
  .mb-count{font-size:26px;font-weight:700;color:var(--negative)}
  .mb-bar.good .mb-count{color:var(--positive);font-size:22px}

  /* Progress */
  .prog-wrap{background:var(--rule);border-radius:4px;height:6px;margin-top:8px}
  .prog-fill{height:6px;border-radius:4px;background:var(--accent);transition:width .3s}
  .prog-fill.gd{background:var(--positive)}

  /* Breadcrumb */
  .bc{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:13px;color:var(--ink-light)}
  .bc a{color:var(--ink-light);text-decoration:none;cursor:pointer}
  .bc a:hover{color:var(--accent)}
  .bc .sep{color:var(--rule)}
  .bc .cur{color:var(--ink);font-weight:500}

  /* Toast */
  .toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--ink);color:#fff;
    padding:13px 20px;border-radius:10px;font-size:14px;font-weight:500;
    box-shadow:var(--shadow-lg);transform:translateY(100px);opacity:0;transition:all .3s}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.ts{border-left:4px solid var(--positive)}
  .toast.te{border-left:4px solid var(--negative)}
  .toast.tw{border-left:4px solid var(--gold)}

  .del-btn{background:none;border:none;cursor:pointer;color:var(--ink-light);
    font-size:18px;padding:4px 6px;transition:color .15s;line-height:1}
  .del-btn:hover{color:var(--negative)}
  .add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    padding:12px;border-radius:10px;border:2px dashed var(--rule);background:transparent;
    cursor:pointer;font-size:14px;font-weight:500;color:var(--ink-light);transition:all .18s;margin-top:12px}
  .add-btn:hover{border-color:var(--accent);color:var(--accent);background:#fff5f5}
  .form-footer{display:flex;gap:10px;justify-content:flex-end;padding:18px 0;flex-wrap:wrap}
  .text-muted{color:var(--ink-light);font-size:13px}
  h2.pg-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:6px}
  .pg-sub{color:var(--ink-light);font-size:14px;margin-bottom:20px}

  /* Modal */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
    z-index:200;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto}
  .overlay.open{display:flex}
  .modal{background:var(--card);border-radius:var(--radius);width:100%;max-width:600px;
    box-shadow:var(--shadow-lg);animation:sUp .2s ease;margin:auto}
  @keyframes sUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-hd{padding:17px 22px;border-bottom:1px solid var(--rule);
    display:flex;align-items:center;justify-content:space-between}
  .modal-hd h3{font-family:'DM Serif Display',serif;font-size:20px}
  .modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--ink-light);line-height:1}
  .modal-bd{padding:22px}
  .modal-ft{padding:15px 22px;border-top:1px solid var(--rule);display:flex;gap:10px;justify-content:flex-end}
  .mdiv{border:none;border-top:1px solid var(--rule);margin:15px 0}

  /* Sync banner */
  .sync-banner{display:flex;align-items:center;gap:10px;padding:10px 16px;
    border-radius:8px;font-size:13px;margin-bottom:16px;font-weight:500}
  .sync-banner.info{background:#e8f4fd;color:#1a6b9e;border:1px solid #b8d8f0}
  .sync-banner.warn{background:#fef3d8;color:#8a4d00;border:1px solid #f5d88a}
  .sync-banner.ok{background:#d4f0e2;color:var(--positive);border:1px solid #b8e0c8}
</style>
</head>
<body>

<header>
  <div class="logo">Vanto <span class="ac">Group</span><span class="sub">Strategic Map</span></div>
  <div class="hdr-right" id="hdrRight">
    <button class="btn btn-ghost" id="btnSignIn" onclick="signIn()" style="display:none">
      <img class="google-icon" src="https://www.google.com/favicon.ico" width="16"> Sign in with Google
    </button>
  </div>
</header>

<div class="main" id="app">
  <div class="loading-screen"><div class="spinner"></div><div>Loading…</div></div>
</div>
<div class="toast" id="toast"></div>

<!-- Stakeholder Modal -->
<div class="overlay" id="sOverlay">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="mTitle">Add Stakeholder</h3>
      <button class="modal-close" onclick="closeSM()">✕</button>
    </div>
    <div class="modal-bd" id="mBody"></div>
    <div class="modal-ft">
      <button class="btn btn-outline" onclick="closeSM()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSH()">Save Stakeholder</button>
    </div>
  </div>
</div>

<!-- Google Identity / Drive API -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>

<script>
// ═══════════════════════════════════════════════════

    await gapi.client.init({});

    tryInit();

}

window.onload = () => {

  const waitGSI = setInterval(() => {
    if (window.google && google.accounts) {
      clearInterval(waitGSI);
      gsiReady = true;
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: onGoogleIdToken,
        auto_select: true
      });
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: onTokenResponse
      });
      tryInit();
    }
  }, 200);
};

function tryInit() {
  if (!gsiReady || !gapiReady) return;
  // Check for cached token
  const cached = sessionStorage.getItem('vsm_token');
  const cachedUser = sessionStorage.getItem('vsm_user');
  if (cached && cachedUser) {
    accessToken = cached;
    currentUser = JSON.parse(cachedUser);
    gapi.client.setToken({access_token: accessToken});
    finishAuth();
  } else {
    showAuthScreen();
  }
}

// ═══════════════════════════════════════════════════
//  DRIVE OPERATIONS
// ═══════════════════════════════════════════════════
async function driveRequest(method, path, params, body) {
  const url = new URL('https://www.googleapis.com/drive/v3/' + path);
  if (params) Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  const opts = {method, headers: {Authorization:'Bearer '+accessToken}};
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(url, opts);
  if (!r.ok) {
    const err = await r.text();
    throw new Error(`Drive API ${method} ${path}: ${r.status} ${err}`);
  }
  return r.status === 204 ? null : r.json();
}

async function findFile(name) {
  const q = `name='${name}' and '${FOLDER_ID}' in parents and trashed=false`;
  const res = await driveRequest('GET','files',{q,fields:'files(id,name,modifiedTime)'}); 
  return res.files && res.files.length ? res.files[0] : null;
}

async function readJsonFile(fileId) {
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    {headers:{Authorization:'Bearer '+accessToken}}
  );
  if (!res.ok) throw new Error('Cannot read file '+fileId);
  return res.json();
}

async function writeJsonFile(fileId, data) {
  // Update existing file content
  const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
  const fd = new FormData();
  fd.append('metadata', new Blob([JSON.stringify({})], {type:'application/json'}));
  fd.append('file', blob);
  const res = await fetch(
    `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`,
    {method:'PATCH', headers:{Authorization:'Bearer '+accessToken}, body:fd}
  );
  if (!res.ok) throw new Error('Cannot write file '+fileId);
  return res.json();
}

async function createJsonFile(name, data) {
  // Create file metadata
  const meta = await driveRequest('POST','files',{fields:'id'},{
    name, parents:[FOLDER_ID], mimeType:'application/json'
  });
  await writeJsonFile(meta.id, data);
  return meta.id;
}

async function loadAllMaps() {
  try {
    // Load index file
    const idxFile = await findFile(INDEX_FILE);
    if (idxFile) {
      const idx = await readJsonFile(idxFile.id);
      driveIndex = idx.fileMap || {};
      // Load all individual map files
      const loaded = [];
      for (const [mapId, fileId] of Object.entries(driveIndex)) {
        try {
          const m = await readJsonFile(fileId);
          loaded.push(m);
        } catch(e) {
          console.warn('Could not load map', mapId, e);
        }
      }
      maps = loaded;
    } else {
      // First run — create empty index
      driveIndex = {};
      maps = [];
      await createJsonFile(INDEX_FILE, {fileMap:{}, version:1});
    }
  } catch(e) {
    console.error('loadAllMaps error', e);
    showToast('Could not load maps from Drive. Check your connection.', 'te');
    maps = [];
  }
}

async function saveMapToDrive(m) {
  setSyncing(true);
  try {
    const fileName = DATA_PREFIX + m.id + '.json';
    let fileId = driveIndex[m.id];
    if (fileId) {
      await writeJsonFile(fileId, m);
    } else {
      fileId = await createJsonFile(fileName, m);
      driveIndex[m.id] = fileId;
      await saveIndex();
    }
    showToast('Saved to Google Drive ✓', 'ts');
  } catch(e) {
    console.error('saveMapToDrive', e);
    showToast('Sync failed — saved locally as backup', 'tw');
    localStorage.setItem('vsm_backup_'+m.id, JSON.stringify(m));
  } finally {
    setSyncing(false);
  }
}

async function deleteMapFromDrive(mapId) {
  setSyncing(true);
  try {
    const fileId = driveIndex[mapId];
    if (fileId) {
      await driveRequest('DELETE','files/'+fileId);
      delete driveIndex[mapId];
      await saveIndex();
    }
  } catch(e) {
    console.error('deleteMapFromDrive', e);
  } finally {
    setSyncing(false);
  }
}

async function saveIndex() {
  const idxFile = await findFile(INDEX_FILE);
  if (idxFile) {
    await writeJsonFile(idxFile.id, {fileMap: driveIndex, version: 1});
  }
}

function fmtDate(v) {
  if (!v) return '—';
  const p = v.substring(0,10).split('-');
  return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : v;
}
function timeAgo(iso) {
  const d=new Date(iso), diff=Math.floor((Date.now()-d)/1000);
  if(diff<60) return 'Just now';
  if(diff<3600) return `${Math.floor(diff/60)}m ago`;
  if(diff<86400) return `${Math.floor(diff/3600)}h ago`;
  if(diff<604800) return `${Math.floor(diff/86400)}d ago`;
  return fmtDate(d.toISOString().substring(0,10));
}
function esc(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function missing(m){
  let c=0;
  if(!m.client) c++; if(!m.outcome) c++; if(!m.accountable) c++; if(!m.byWhen) c++;
  (m.stakeholders||[]).forEach(s=>{
    if(!s.name) c++;
    if(s.attitude===''||s.attitude===null||s.attitude===undefined) c++;
    if(!s.partnership) c++;
    if(!s.winResult) c++;
  });
  return c;
}
function pct(m){
  const mis=missing(m), tot=8+(m.stakeholders.length*4);
  return Math.round(((tot-mis)/tot)*100);
}
function showToast(msg,type='ts'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  setTimeout(()=>t.classList.remove('show'),3500);
}
function showView(v,id){
  view=v; activeId=id||null; render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderDashboard(){
  // Filter controls
  const filterMap = {all:'All Deals', red:'Needs Attention', alert:'Has Alerts', closing:'Closing Soon'};

  let filtered = [...maps];
  if(chFilter==='red')     filtered = filtered.filter(m=>pct(m)<50);
  if(chFilter==='alert')   filtered = filtered.filter(m=>m.alerts&&m.alerts.length>0);
  if(chFilter==='closing') filtered = filtered.filter(m=>{
    if(!m.byWhen) return false;
    const days=(new Date(m.byWhen)-Date.now())/(1000*60*60*24);
    return days>=0 && days<=30;
  });

  filtered.sort((a,b)=>pct(a)-pct(b)); // worst first

  // Stats
  const total = maps.length;
  const atRisk = maps.filter(m=>pct(m)<50).length;
  const withAlerts = maps.filter(m=>m.alerts&&m.alerts.length>0).length;
  const closingSoon = maps.filter(m=>{
    if(!m.byWhen) return false;
    const days=(new Date(m.byWhen)-Date.now())/(1000*60*60*24);
    return days>=0&&days<=30;
  }).length;
  const avgPct = total ? Math.round(maps.reduce((s,m)=>s+pct(m),0)/total) : 0;

  const filterBtns = Object.entries(filterMap).map(([k,l])=>
    `<button class="filter-btn ${chFilter===k?'active':''}" onclick="setCHFilter('${k}')">${l}</button>`
  ).join('');

  const rows = filtered.map(m=>{
    const p=pct(m);
    const readLabel = m.readiness!==null&&m.readiness!==undefined ? GAUGE[m.readiness] : '—';
    const hasAlert = m.alerts&&m.alerts.length>0;
    return `<div class="ch-row" onclick="showView('detail','${m.id}')">
      <div>
        <div class="ch-cell-primary">${esc(m.client)||'Unnamed'}</div>
        <div class="ch-cell-sub">${m.title?esc(m.title):'No title'}</div>
      </div>
      <div>
        <div style="font-size:13px;font-weight:500">${esc(m.accountable)||'—'}</div>
        <div class="ch-cell-sub">${m.owner?m.owner.split('@')[0]:''}</div>
      </div>
      <div>
        <div style="font-size:13px">${m.byWhen?fmtDate(m.byWhen):'—'}</div>
        ${m.byWhen?`<div class="ch-cell-sub">${daysUntil(m.byWhen)}</div>`:''}
      </div>
      <div>
        <div style="font-size:13px;font-weight:700;color:${p>=80?'var(--positive)':p>=50?'var(--warn)':'var(--negative)'}">${p}%</div>
        <div class="prog-mini"><div class="prog-mini-fill ${p>=80?'gd':''}" style="width:${p}%"></div></div>
      </div>
      <div style="font-size:12px">${hasAlert?`<span class="alert-dot"></span>${m.alerts.length} alert${m.alerts.length>1?'s':''}`:
        `<span style="color:var(--positive)">✓ Clear</span>`}</div>
      <div style="font-size:12px;color:var(--ink-light)">${readLabel}</div>
    </div>`;
  }).join('') || `<div style="padding:30px 22px;text-align:center;color:var(--ink-light)">No deals match this filter</div>`;

  return `
  <div class="ch-header">
    <h2>India Dashboard</h2>
    <p>All active strategic maps across the India team · ${total} total deal${total!==1?'s':''}</p>
  </div>

  <div class="ch-stats">
    <div class="ch-stat"><div class="num">${total}</div><div class="lbl">Total Active Deals</div></div>
    <div class="ch-stat good"><div class="num">${avgPct}%</div><div class="lbl">Avg Readiness</div></div>
    <div class="ch-stat danger"><div class="num">${atRisk}</div><div class="lbl">Needs Attention (&lt;50%)</div></div>
    <div class="ch-stat warn"><div class="num">${closingSoon}</div><div class="lbl">Closing in 30 Days</div></div>
  </div>

  <div class="ch-filters">${filterBtns}</div>

  <div class="ch-table">
    <div class="ch-table-header">
      <div>Client / Deal</div>
      <div>Accountable</div>
      <div>Close By</div>
      <div>Readiness</div>
      <div>Alerts</div>
      <div>Rep Feeling</div>
    </div>
    ${rows}
  </div>`;
}

function daysUntil(dateStr){
  const days=Math.round((new Date(dateStr)-Date.now())/(1000*60*60*24));
  if(days<0) return `<span style="color:var(--negative)">${Math.abs(days)}d overdue</span>`;
  if(days===0) return `<span style="color:var(--negative)">Today!</span>`;
  if(days<=7) return `<span style="color:var(--warn)">${days}d left</span>`;
  if(days<=30) return `<span style="color:var(--warn)">${days}d left</span>`;
  return `${days}d left`;
}

  return `
  <div class="bc"><a onclick="showView('list')">My Maps</a><span class="sep">›</span><span class="cur">New Strategic Map</span></div>
  ${misBar}
  <div class="outcome-box section-gap">
    <div style="font-family:'DM Serif Display',serif;font-size:21px;color:#fff;opacity:.9;margin-bottom:18px">Deal Overview</div>
    <div class="field-row">
      <div class="field"><label>CLIENT / PROSPECT <span class="req">*</span></label>
        <input type="text" placeholder="Company name" value="${esc(m.client)}" oninput="form.client=this.value"></div>
      <div class="field"><label>DEAL TITLE / OPPORTUNITY</label>
        <input type="text" placeholder="Short description" value="${esc(m.title)}" oninput="form.title=this.value"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>PERSON ACCOUNTABLE FOR OUTCOME <span class="req">*</span></label>
        <input type="text" placeholder="Name + role at Vanto Group" value="${esc(m.accountable)}" oninput="form.accountable=this.value"></div>
      <div class="field"><label>WILL CAUSE CLOSING BY</label>
        <input type="date" value="${esc(m.byWhen)}" oninput="form.byWhen=this.value">
        ${m.byWhen?`<div class="hint" style="color:rgba(255,255,255,.5)">${fmtDate(m.byWhen)}</div>`:''}
      </div>
    </div>
    <div class="field"><label>SPECIFIC OUTCOME <span class="req">*</span></label>
      <textarea placeholder="Action verb + Measurable Output + Timeframe…" oninput="form.outcome=this.value">${esc(m.outcome)}</textarea>
      <div class="hint">Format: Action verb + Measurable Output + Timeframe</div>
    </div>
  </div>

  <div class="form-card section-gap">
    <div class="sec-hdr"><h2>Prospect Stakeholders</h2><span class="badge">${m.stakeholders.length} added</span></div>
    <div class="sec-body">
      <p class="text-muted" style="margin-bottom:14px">Map every person who influences this deal — their buying influence type, attitude, relationship level, and what they personally need.</p>
      <div class="sh-list">${shCards}</div>
      <button class="add-btn" onclick="openSM()"><span style="font-size:20px">+</span> Add Stakeholder</button>
    </div>
  </div>

  <div class="form-card section-gap">
    <div class="sec-hdr"><h2>Strategic Actions</h2><span class="badge">${m.actions.length} action${m.actions.length!==1?'s':''}</span></div>
    <div class="sec-body">
      <p class="text-muted" style="margin-bottom:14px">Prioritised actions to address what's missing and advance this deal.</p>
      <div class="act-list">${actHtml}</div>
      <button class="add-btn" onclick="addAction()"><span style="font-size:20px">+</span> Add Action</button>
    </div>
  </div>

  <div class="form-card section-gap">
    <div class="sec-hdr"><h2>Alerts</h2>${m.alerts&&m.alerts.length?`<span class="badge">${m.alerts.length} active</span>`:''}</div>
    <div class="sec-body">
      <p class="text-muted" style="margin-bottom:12px">Flag conditions that could jeopardise this deal.</p>
      <div class="alert-grid">${alertHtml}</div>
    </div>
  </div>

  <div class="gauge-sec section-gap">
    <h3>Your Readiness Level</h3>
    <div class="gauge-sub">How do you honestly feel about this deal right now?</div>
    <div class="gauge-scale">${gaugeHtml}</div>
  </div>

  <div class="form-footer">
    <button class="btn btn-outline" onclick="showView('list')">Cancel</button>
    <button class="btn btn-primary" onclick="saveMap()">💾 Save to Drive</button>
  </div>`;
}

// ═══════════════════════════════════════════════════
//  STAKEHOLDER CARD
// ═══════════════════════════════════════════════════
function shCard(s,i,editable){
  const tObj=ITYPES.find(t=>t.c===s.type)||{};
  const aObj=ATT.find(e=>e.v==s.attitude);
  const aLabel=aObj?aObj.l:'—';
  const aColor=s.attitude>0?'color:var(--positive)':s.attitude<0?'color:var(--negative)':'color:#555';
  const pObj=PART.find(p=>p.c===s.partnership);
  const pLabel=pObj?`${pObj.c} — ${pObj.l}`:'—';
  const pColor=s.partnership==='P'?'color:var(--negative)':s.partnership==='EC'?'color:var(--warn)':s.partnership==='G'?'color:var(--positive)':'color:var(--teal)';
  return `<div class="sh-card">
    <div class="sh-hdr">
      <div>
        <div style="font-weight:600;font-size:15px">${esc(s.name)||'Unnamed'}</div>
        <div style="font-size:12px;color:var(--ink-light);margin-top:2px">${esc(s.role)||''}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span class="type-badge type-${s.type||'E'}">${s.type||'?'} — ${esc(tObj.l)||''}</span>
        ${editable?`<button class="btn btn-outline btn-sm" onclick="openSM(${i})">Edit</button>
        <button class="del-btn" onclick="remSH(${i})">🗑</button>`:''}
      </div>
    </div>
    <div class="sh-body">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;font-size:13px">
        <div>
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;color:var(--ink-light);margin-bottom:3px">Attitude</div>
          <div style="font-weight:600;${aColor}">${aLabel}${aObj?` (${aObj.v>0?'+':''}${aObj.v})`:''}</div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;color:var(--ink-light);margin-bottom:3px">Partnership</div>
          <div style="font-weight:600;${pColor}">${pLabel}</div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;color:var(--ink-light);margin-bottom:3px">Missing Info</div>
          <div style="font-weight:600;${!s.missing?'color:var(--positive)':'color:var(--warn)'}">${esc(s.missing)||'None'}</div>
        </div>
      </div>
      ${s.winResult?`<div style="font-size:12px;background:var(--bg);padding:8px 10px;border-radius:6px"><strong>Personal win result:</strong> ${esc(s.winResult)}</div>`:''}
      ${s.orgResult?`<div style="font-size:12px;background:var(--bg);padding:8px 10px;border-radius:6px"><strong>Org result:</strong> ${esc(s.orgResult)}</div>`:''}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
//  DETAIL VIEW
// ═══════════════════════════════════════════════════
function renderDetail(){
  const m=maps.find(x=>x.id===activeId);
  if(!m) return '<p>Map not found.</p>';
  const mis=missing(m), tot=8+(m.stakeholders.length*4);
  const p=pct(m);
  const readLabel=m.readiness!==null&&m.readiness!==undefined?GAUGE[m.readiness]:'—';
  const alertHtml=m.alerts&&m.alerts.length
    ?m.alerts.map(a=>`<span class="spill" style="background:#fef3d8;color:var(--warn)">⚠ ${esc(a)}</span>`).join('')
    :'<span class="text-muted">None</span>';
  const stakeHtml=m.stakeholders.length?m.stakeholders.map((s,i)=>shCard(s,i,false)).join(''):'<p class="text-muted">No stakeholders recorded.</p>';
  const actHtml=m.actions.filter(a=>a.text).map((a,i)=>`
    <div style="display:grid;grid-template-columns:28px 1fr 120px 100px;gap:10px;align-items:start;padding:11px;background:var(--bg);border-radius:8px">
      <div class="act-idx">${i+1}</div>
      <div style="font-size:14px">${esc(a.text)}</div>
      <div style="font-size:12px;color:var(--ink-light)">${esc(a.who)}</div>
      <div style="font-size:12px;color:var(--ink-light)">${a.when?fmtDate(a.when):'—'}</div>
    </div>`).join('')||'<p class="text-muted">No actions recorded.</p>';

  const fromList = isCountryHead() && maps.some(x=>x.owner!==currentUser?.email&&x.id===activeId)
    ? 'dashboard' : 'list';

  return `
  <div class="bc">
    <a onclick="showView('${fromList}')">${fromList==='dashboard'?'India Dashboard':'My Maps'}</a>
    <span class="sep">›</span><span class="cur">${esc(m.client)}</span>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div>
      <h2 class="pg-title">${esc(m.client)}</h2>
      <p class="text-muted">${m.title?esc(m.title)+' · ':''}${m.accountable?esc(m.accountable):''}${m.byWhen?' · Close by '+fmtDate(m.byWhen):''}</p>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button class="btn btn-outline" onclick="editMap('${m.id}')">✏️ Edit</button>
      <button class="btn btn-outline" style="color:var(--negative);border-color:#f5c6c4" onclick="delMap('${m.id}')">🗑 Delete</button>
    </div>
  </div>

  <div style="background:var(--card);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow);margin-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-weight:600">Map Completeness</div><div style="font-weight:700;font-size:22px">${p}%</div>
    </div>
    <div class="prog-wrap"><div class="prog-fill ${p>=80?'gd':''}" style="width:${p}%"></div></div>
    <div style="margin-top:12px;display:flex;gap:18px;flex-wrap:wrap;font-size:13px">
      <span>🎯 Readiness: <strong>${readLabel}</strong></span>
      <span>⚠ Alerts: <strong>${m.alerts?.length||0}</strong></span>
      <span>🚩 Missing: <strong>${mis} field${mis!==1?'s':''}</strong></span>
      <span>📅 Updated: <strong>${timeAgo(m.updatedAt)}</strong></span>
    </div>
  </div>

  <div style="background:linear-gradient(135deg,#0f1117,#1e2235);border-radius:var(--radius);padding:22px;color:#fff;margin-bottom:20px">
    <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.4);margin-bottom:6px">Specific Outcome</div>
    <div style="font-size:17px;line-height:1.6">${esc(m.outcome)||'<span style="opacity:.4">Not defined</span>'}</div>
  </div>

  <div class="form-card section-gap">
    <div class="sec-hdr"><h2>Stakeholders</h2><span class="badge">${m.stakeholders.length}</span></div>
    <div class="sec-body"><div class="sh-list">${stakeHtml}</div></div>
  </div>
  <div class="form-card section-gap">
    <div class="sec-hdr"><h2>Strategic Actions</h2></div>
    <div class="sec-body"><div style="display:grid;gap:8px">${actHtml}</div></div>
  </div>
  <div style="background:var(--card);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow)">
    <div style="font-weight:600;margin-bottom:10px">Alerts</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">${alertHtml}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════
//  FORM HELPERS
// ═══════════════════════════════════════════════════
function setReadiness(i){ form.readiness=form.readiness===i?null:i; render(); }
function togAlert(a){
  if(!form.alerts) form.alerts=[];
  const i=form.alerts.indexOf(a);
  i>=0?form.alerts.splice(i,1):form.alerts.push(a);
  render();
}
function addAction(){ form.actions.push({text:'',who:'',when:''}); render(); }
function remAction(i){ form.actions.splice(i,1); render(); }

async function saveMap(){
  const m={...form};
  if(!m.client.trim()){showToast('Client name is required','te');return;}
  if(!m.outcome.trim()){showToast('Specific outcome is required','te');return;}
  m.updatedAt=new Date().toISOString();
  // Sync any unsaved input values
  document.querySelectorAll('input,textarea').forEach(el=>{
    if(el.dataset.field) m[el.dataset.field]=el.value;
  });
  const idx=maps.findIndex(x=>x.id===m.id);
  idx>=0?maps[idx]=m:maps.push(m);
  form=m;
  showView('detail', m.id);
  await saveMapToDrive(m);
}

function editMap(id){
  form=JSON.parse(JSON.stringify(maps.find(x=>x.id===id)));
  view='new'; render();
  window.scrollTo({top:0,behavior:'smooth'});
}

async function delMap(id){
  if(!confirm('Delete this strategic map? This cannot be undone.')) return;
  maps=maps.filter(x=>x.id!==id);
  await deleteMapFromDrive(id);
  showToast('Map deleted');
  showView('list');
}

function remSH(i){ form.stakeholders.splice(i,1); render(); }

// ═══════════════════════════════════════════════════
//  STAKEHOLDER MODAL
// ═══════════════════════════════════════════════════
function openSM(idx){
  editIdx=idx!==undefined?idx:null;
  tmp=idx!==undefined
    ?JSON.parse(JSON.stringify(form.stakeholders[idx]))
    :{name:'',role:'',type:'E',attitude:'',partnership:'',winResult:'',orgResult:'',missing:''};
  document.getElementById('mTitle').textContent=idx!==undefined?'Edit Stakeholder':'Add Stakeholder';
  document.getElementById('mBody').innerHTML=renderSHForm();
  document.getElementById('sOverlay').classList.add('open');
}
function closeSM(){ document.getElementById('sOverlay').classList.remove('open'); }
function saveSH(){
  if(!tmp.name||!tmp.name.trim()){showToast('Name is required','te');return;}
  editIdx!==null&&editIdx>=0?form.stakeholders[editIdx]={...tmp}:form.stakeholders.push({...tmp});
  closeSM(); render();
}

function renderSHForm(){
  const typeHtml=ITYPES.map(t=>`
    <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;
      border:1.5px solid ${tmp.type===t.c?'var(--teal)':'var(--rule)'};border-radius:8px;cursor:pointer;
      background:${tmp.type===t.c?'#f0f9fa':'#fff'};font-size:13px;transition:all .15s"
      onclick="setTT('${t.c}')">
      <strong style="color:var(--teal);min-width:22px;font-size:14px">${t.c}</strong>
      <div><div style="font-weight:600">${t.l}</div><div style="font-size:11px;color:var(--ink-light)">${t.d}</div></div>
    </div>`).join('');

  const attHtml=ATT.map(e=>{
    const sel=tmp.attitude!==''&&tmp.attitude!==null&&tmp.attitude!==undefined&&Number(tmp.attitude)===e.v;
    const base=e.v<0?'att-neg':e.v>0?'att-pos':'att-neu';
    const selC=e.v<0?'att-sel-neg':e.v>0?'att-sel-pos':'att-sel-neu';
    return `<button class="att-btn ${sel?selC:base}" onclick="setTA(${e.v})" title="${e.l}">
      <span class="num">${e.v>0?'+':''}${e.v}</span><span style="font-size:8px">${e.s}</span></button>`;
  }).join('');

  const partHtml=PART.map(p=>{
    const sel=tmp.partnership===p.c;
    const bgSel=`background:${p.col};color:#fff;border-color:${p.col}`;
    const bgDef=p.c==='P'?'background:#fff5f5;color:var(--negative)':p.c==='EC'?'background:#fffbf0;color:var(--warn)':p.c==='G'?'background:#f0fdf4;color:var(--positive)':'background:#f0f8fb;color:var(--teal)';
    return `<button class="par-btn ${sel?'par-sel':''}" style="${sel?bgSel:bgDef}" onclick="setTP('${p.c}')">
      <span class="par-code">${p.c}</span><span class="par-name">${p.l}</span></button>`;
  }).join('');

  const selAtt=ATT.find(e=>e.v==tmp.attitude);
  const selPart=PART.find(p=>p.c===tmp.partnership);

  return `<div style="display:grid;gap:17px">
    <div class="field-row" style="margin-bottom:0">
      <div class="field"><label>FULL NAME <span class="req">*</span></label>
        <input type="text" placeholder="First Last" value="${esc(tmp.name)}" oninput="tmp.name=this.value"></div>
      <div class="field"><label>JOB TITLE / ROLE</label>
        <input type="text" placeholder="e.g. CFO, HR Director" value="${esc(tmp.role)}" oninput="tmp.role=this.value"></div>
    </div>
    <div class="field"><label>BUYING INFLUENCE TYPE</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${typeHtml}</div>
    </div>
    <hr class="mdiv">
    <div>
      <span class="block-label">ATTITUDE — How this person feels about this deal</span>
      <div class="legend-strip">
        <span class="lchip lc-prob">Negative = Opposed / Resistant</span>
        <span class="lchip lc-stable">0 = Uninterested</span>
        <span class="lchip lc-growth">Positive = Accepting / Supportive</span>
      </div>
      <div class="att-scale">${attHtml}</div>
      ${selAtt?`<div style="margin-top:7px;font-size:12px;color:var(--ink-light);font-style:italic">Selected: <strong>${selAtt.l}</strong></div>`:''}
    </div>
    <hr class="mdiv">
    <div>
      <span class="block-label">PARTNERSHIP LEVEL — Quality of your business relationship</span>
      <div class="legend-strip">
        <span class="lchip lc-growth">G = Growth</span>
        <span class="lchip lc-prob">P = Problematic</span>
        <span class="lchip lc-stable">S = Stable</span>
        <span class="lchip lc-ec">EC = Excess Confidence</span>
      </div>
      <div class="part-wrap">
        <div class="part-scale">${partHtml}</div>
        <div style="margin-top:9px;font-size:12px;color:var(--ink-light);font-style:italic">${selPart?selPart.d:'Select a partnership level above'}</div>
      </div>
    </div>
    <hr class="mdiv">
    <div class="field"><label>WHAT'S IN IT FOR THIS PERSON? (Personal Win Result)</label>
      <textarea placeholder="What does this person personally gain — career, recognition, avoiding blame…" oninput="tmp.winResult=this.value" style="min-height:60px">${esc(tmp.winResult)}</textarea>
    </div>
    <div class="field"><label>WHAT'S IN IT FOR THEM INSIDE THE COMPANY? (Org Result)</label>
      <textarea placeholder="What business/organisational results do they need to demonstrate?" oninput="tmp.orgResult=this.value" style="min-height:60px">${esc(tmp.orgResult)}</textarea>
    </div>
    <div class="field"><label>WHAT'S MISSING? (Info or access you still need)</label>
      <input type="text" placeholder="What don't you yet know or need to get from/about this person?" value="${esc(tmp.missing)}" oninput="tmp.missing=this.value">
    </div>
  </div>`;
}

function setTA(v){ tmp.attitude=tmp.attitude==v?'':v; document.getElementById('mBody').innerHTML=renderSHForm(); }
function setTP(c){ tmp.partnership=tmp.partnership===c?'':c; document.getElementById('mBody').innerHTML=renderSHForm(); }
function setTT(c){ tmp.type=c; document.getElementById('mBody').innerHTML=renderSHForm(); }
</script>
</body>
</html>
