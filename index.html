<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanto Strategic Map</title>
    <script>
        // PKCE implementation
        const clientId = '569636278695-rf4palrjq7mtbkdn3socphh5h1dftrd5.apps.googleusercontent.com';
        const redirectUri = 'https://niravvyas72.github.io/vanto-strategic-map/';

        function generateCodeChallenge() {
            const codeVerifier = generateRandomString();
            const codeChallenge = btoa(String.fromCharCode.apply(null, new Uint8Array(window.crypto.getRandomValues(new Uint8Array(32)))));
            // Store verifier in session storage
            sessionStorage.setItem('codeVerifier', codeVerifier);
            return codeChallenge;
        }

        function generateRandomString(length = 128) {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
            let randomString = '';
            for (let i = 0; i < length; i++) {
                randomString += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return randomString;
        }

        function signIn() {
            const codeChallenge = generateCodeChallenge();
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&response_type=code&redirect_uri=${redirectUri}&scope=openid email profile&code_challenge=${codeChallenge}&code_challenge_method=S256`;
            window.location.href = authUrl;
        }

        async function handleRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                const codeVerifier = sessionStorage.getItem('codeVerifier');
                // Exchange authorization code for access token
                const tokenResponse = await fetch('https://vanto-auth-proxy.vercel.app/api/token', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        code,
                        redirect_uri: redirectUri,
                        client_id: clientId,
                        code_verifier: codeVerifier
                    })
                });
                const tokenData = await tokenResponse.json();
                // Now you can use access token to fetch user info
                const userInfoResponse = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: {'Authorization': `Bearer ${tokenData.access_token}`}
                });
                const userInfo = await userInfoResponse.json();
                console.log('User Info:', userInfo);
            }
        }

        window.onload = handleRedirect;
    </script>
</head>
<body>
    <h1>Vanto Strategic Map</h1>
    <button onclick="signIn()">Sign in with Google</button>
</body>
</html>
