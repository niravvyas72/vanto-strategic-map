<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Vanto Strategic Map</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            margin: 0;\n            background-color: #f0f0f0;\n        }\n        .container {\n            text-align: center;\n        }\n        .google-signin {\n            background-color: red;\n            color: white;\n            padding: 10px 20px;\n            border: none;\n            border-radius: 5px;\n            cursor: pointer;\n        }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>Vanto Strategic Map</h1>\n        <button class="google-signin" onclick="signInWithGoogle()">Sign in with Google</button>\n    </div>\n    <script>\n        const CLIENT_ID = '569636278695-rf4palrjq7mtbkdn3socphh5h1dftrd5.apps.googleusercontent.com';\n        let codeVerifier = '';\n        let state = '';\n        const REDIRECT_URI = 'https://yourapp.com/callback';\n\n        function generateRandomString(length) {\n            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';\n            let result = '';\n            for (let i = 0; i < length; i++) {\n                result += characters.charAt(Math.floor(Math.random() * characters.length));\n            }\n            return result;\n        }\n\n        function sha256(plain) {\n            const encoder = new TextEncoder();\n            return crypto.subtle.digest('SHA-256', encoder.encode(plain));\n        }\n\n        async function signInWithGoogle() {\n            codeVerifier = generateRandomString(128);\n            state = generateRandomString(16);\n            const codeChallenge = await sha256(codeVerifier).then(buffer => {\n                return btoa(String.fromCharCode(...new Uint8Array(buffer))).replace(/=/g, '');\n            });\n\n            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +\n                new URLSearchParams({\n                    client_id: CLIENT_ID,\n                    redirect_uri: REDIRECT_URI,\n                    response_type: 'code',\n                    scope: 'email',\n                    code_challenge: codeChallenge,\n                    code_challenge_method: 'S256',\n                    state: state\n                }).toString();\n            window.location.href = authUrl;\n        }\n\n        async function handleAuthResult() {\n            const params = new URLSearchParams(window.location.search);\n            const code = params.get('code');\n            const receivedState = params.get('state');\n\n            if (state !== receivedState) {\n                console.error('Invalid state');\n                return;\n            }\n\n            const tokenResponse = await fetch('https://vanto-auth-proxy.vercel.app/api/token', {\n                method: 'POST',\n                headers: { 'Content-Type': 'application/json' },\n                body: JSON.stringify({\n                    client_id: CLIENT_ID,\n                    code: code,\n                    code_verifier: codeVerifier,\n                    redirect_uri: REDIRECT_URI,\n                    grant_type: 'authorization_code'\n                })\n            });\n            const tokenData = await tokenResponse.json();\n            sessionStorage.setItem('access_token', tokenData.access_token);\n            fetchUserInfo(tokenData.access_token);\n        }\n\n        async function fetchUserInfo(accessToken) {\n            const userInfoResponse = await fetch('https://www.googleapis.com/oauth2/v1/userinfo?alt=json', {\n                headers: { 'Authorization': 'Bearer ' + accessToken }\n            });\n            const userInfo = await userInfoResponse.json();\n            document.body.innerHTML = `<h1>Welcome, ${userInfo.email}</h1>`;\n        }\n\n        if (window.location.search) {\n            handleAuthResult();\n        }\n    <\/script>\n</body>\n</html>
