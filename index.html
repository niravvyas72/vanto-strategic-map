<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Map Dashboard</title>
    <script>
        function handleSignIn() {
            // Assume sign-in logic here
            const accessToken = 'your_access_token'; // replace with the actual token
            sessionStorage.setItem('access_token', accessToken);
            renderDashboard();
        }

        function renderDashboard() {
            document.body.innerHTML = `<h1>Strategic Map Dashboard</h1>` +
                `<button id='createMapBtn'>Create New Map</button>` +
                `<h2>My Maps</h2><ul id='mapList'></ul>`;
            document.getElementById('signInBtn').style.display = 'none'; // Hide sign-in button
        }

        window.onload = function() {
            const isSignedIn = !!sessionStorage.getItem('access_token');
            if (isSignedIn) {
                renderDashboard();
            } else {
                document.body.innerHTML = `<button id='signInBtn' onclick='handleSignIn()'>Sign In</button>`;
            }
        };
    </script>
</head>
<body>
    <button id='signInBtn' onclick='handleSignIn()'>Sign In</button>
</body>
</html>
