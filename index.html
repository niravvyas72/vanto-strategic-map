<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #dashboard { display: none; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>OAuth Authentication</h1>
    <button id="loginBtn">Login with Google</button>
    <div id="dashboard">
        <h2>Welcome to the Dashboard</h2>
        <div id="userInfo"></div>
    </div>

    <script>
        const clientId = 'YOUR_CLIENT_ID'; // Replace with your client ID
        const redirectUri = 'YOUR_REDIRECT_URI'; // Replace with your redirect URI
        const authEndpoint = 'https://accounts.google.com/o/oauth2/v2/auth';
        const tokenEndpoint = 'YOUR_TOKEN_PROXY_URL'; // Replace with your token proxy URL
        const scope = 'email profile';

        document.getElementById('loginBtn').addEventListener('click', () => {
            const state = Math.random().toString(36).substring(2);
            const authUrl = `${authEndpoint}?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&scope=${scope}&state=${state}`;
            window.location.href = authUrl;
        });

        const params = new URLSearchParams(window.location.search);
        if (params.has('code') && params.has('state')) {
            const code = params.get('code');
            const state = params.get('state');
            console.log('Authorization code:', code);
            // Code exchange with token proxy
            fetch(tokenEndpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, state: state })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Token response:', data);
                sessionStorage.setItem('access_token', data.access_token);
                fetchUserInfo(data.access_token);
            })
            .catch(error => console.error('Error exchanging code:', error));
        }

        function fetchUserInfo(token) {
            fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(response => response.json())
            .then(data => {
                console.log('User info:', data);
                document.getElementById('userInfo').innerText = `Hello, ${data.name}`;
                document.getElementById('dashboard').style.display = 'block';
            })
            .catch(error => console.error('Error fetching user info:', error));
        }
    </script>
</body>
</html>
